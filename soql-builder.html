function toast(msg) {
  const el = document.createElement("div");
  el.textContent = msg;
  Object.assign(el.style, { position:"fixed",bottom:"20px",right:"20px",background:B.purple,color:B.coolWhite,padding:"10px 20px",borderRadius:"6px",fontSize:"13px",fontWeight:"600",zIndex:"9999",animation:"fadeio 2s ease",pointerEvents:"none" });
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

function Btn({children, primary, small, onClick, disabled, style:sx}) {
  return <button onClick={onClick} disabled={disabled} style={{
    padding:small?"4px 10px":"7px 16px", borderRadius:5, fontSize:small?10:11, fontWeight:600,
    border:primary?"1px solid "+B.purple:"1px solid "+B.border,

    color:primary?B.lilac:B.textMuted, cursor:disabled?"default":"pointer",
    fontFamily:"inherit", opacity:disabled?0.35:1, transition:"all 0.15s", ...sx
  }}>{children}</button>;
}

/* Storage helpers - use window.storage in artifact, fallback to localStorage */
async function loadPresets() {
  try {
    if (window.storage) {
      const r = await window.storage.get("soql-presets-v2", true);
      return r?.value ? JSON.parse(r.value) : {};
    }
  } catch(e) {}
  try { return JSON.parse(localStorage.getItem("soql-presets-v2")||"{}"); } catch(e) { return {}; }
}
async function savePresetsStore(data) {
  const str = JSON.stringify(data);
  try { if (window.storage) { await window.storage.set("soql-presets-v2", str, true); return; } } catch(e) {}
  try { localStorage.setItem("soql-presets-v2", str); } catch(e) {}
}

function SOQLBuilder() {
  const [obj, setObj] = useState("Account");
  const [selected, setSelected] = useState(new Set(DEFAULT_PRESETS.Account?.Migration || ["Id"]));
  const [activePreset, setActivePreset] = useState("Migration");
  const [search, setSearch] = useState("");
  const [collapsed, setCollapsed] = useState({ s:true, c:true, e:true, x:true });
  const [wheres, setWheres] = useState([]);
  const [orderBy, setOrderBy] = useState("");
  const [orderDir, setOrderDir] = useState("ASC");
  const [limit, setLimit] = useState("");
  const [customPresets, setCustomPresets] = useState({});
  const [presetName, setPresetName] = useState("");
  const [showSave, setShowSave] = useState(false);
  const [showManage, setShowManage] = useState(false);

  useEffect(() => { loadPresets().then(setCustomPresets); }, []);

  const doSave = async (updated) => { setCustomPresets(updated); await savePresetsStore(updated); };

  const fd = FIELD_DATA[obj] || { s:[], c:[], e:[], x:[] };
  const allFields = [...(fd.s||[]), ...(fd.c||[]), ...(fd.e||[]), ...(fd.x||[])];

  const switchObj = (o) => {
    setObj(o);
    setSelected(new Set(DEFAULT_PRESETS[o]?.Migration || ["Id"]));
    setActivePreset("Migration");
    setSearch(""); setWheres([]); setOrderBy(""); setLimit("");
  };

  const applyPreset = (key) => {
    const cpKey = obj+"::"+key;
    const fields = customPresets[cpKey] || DEFAULT_PRESETS[obj]?.[key] || ["Id"];
    setSelected(new Set(fields));
    setActivePreset(key);
  };

  const toggle = (f) => {
    const n = new Set(selected);
    n.has(f) ? n.delete(f) : n.add(f);
    setSelected(n); setActivePreset(null);
  };

  const selectCat = (cat) => {
    const n = new Set(selected);
    const fields = fd[cat] || [];
    const allSel = fields.every(f => n.has(f));
    fields.forEach(f => allSel ? n.delete(f) : n.add(f));
    if (!n.has("Id")) n.add("Id");
    setSelected(n); setActivePreset(null);
  };

  const collapseAll = () => setCollapsed({ s:true, c:true, e:true, x:true });
  const expandAll = () => setCollapsed({ s:false, c:false, e:false, x:false });

  const savePreset = async () => {
    if (!presetName.trim()) return;
    const key = obj+"::"+presetName.trim();
    const updated = { ...customPresets, [key]: [...selected] };
    await doSave(updated);
    setPresetName(""); setShowSave(false); setActivePreset(presetName.trim());
    toast("Saved \""+presetName.trim()+"\" for "+(OBJ_LABELS[obj]||obj));
  };

  const deletePreset = async (key) => {
    const updated = { ...customPresets }; delete updated[key];
    await doSave(updated); toast("Preset deleted");
  };

  const objCustom = Object.keys(customPresets).filter(k => k.startsWith(obj+"::")).map(k => k.split("::")[1]);

  const addWhere = () => setWheres(p => [...p, { field:"", op:"=", value:"", logic:p.length?"AND":"" }]);
  const updWhere = (i,k,v) => setWheres(p => p.map((w,j) => j===i ? {...w,[k]:v} : w));
  const rmWhere = (i) => setWheres(p => p.filter((_,j) => j!==i));

  const soql = (() => {
    const fields = [...selected].sort((a,b) => a==="Id"?-1:b==="Id"?1:a.localeCompare(b));
    if (!fields.length) return "-- Select at least one field";
    let q = "SELECT "+fields.join(",\n       ")+"\nFROM "+obj;
    const vw = wheres.filter(w => w.field && w.op);
    if (vw.length) {
      const parts = vw.map((w,i) => {
        let c = i>0 ? " "+(w.logic||"AND")+" " : "";
        c += w.field+" ";
        if (["= null","!= null","= TRUE","= FALSE"].includes(w.op)) c += w.op;
        else if (w.op==="IN"||w.op==="NOT IN") c += w.op+" ("+w.value+")";
        else if (w.op==="LIKE") c += "LIKE '"+w.value+"'";
        else if (DATE_LIT.some(d => w.value.toUpperCase().startsWith(d.split(":")[0]))) c += w.op+" "+w.value;
        else if (/^\d+(\.\d+)?$/.test(w.value)||w.value==="true"||w.value==="false") c += w.op+" "+w.value;
        else c += w.op+" '"+w.value+"'";
        return c;
      });
      q += "\nWHERE "+parts.join("\n      ");
    }
    if (orderBy) q += "\nORDER BY "+orderBy+" "+orderDir;
    if (limit) q += "\nLIMIT "+limit;
    return q;
  })();

  const filterField = (f) => !search || f.toLowerCase().includes(search.toLowerCase());

  return (
    <div style={{ minHeight:"100vh", background:B.navy, color:B.coolWhite, ...ss }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:#252E4A;border-radius:3px}
        input::placeholder,textarea::placeholder{color:#9BA3BF;opacity:0.5}
        select,input,textarea{outline:none;font-family:inherit} input:focus,select:focus{border-color:#775ED3!important}
        @keyframes fadeio{0%{opacity:0;transform:translateY(10px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1}100%{opacity:0}}
      `}</style>

      {/* Header */}
      <div style={{ padding:"14px 20px", borderBottom:"1px solid "+B.border, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:"linear-gradient(135deg,"+B.gradA+","+B.gradB+")" }}/>
            <span style={{ fontWeight:700, fontSize:16 }}>NEUMO</span>
            <span style={{ fontWeight:300, fontSize:16, color:B.lilac }}>SOQL Builder</span>
          </div>
          <div style={{ fontSize:10, color:B.textMuted, paddingLeft:16, ...mono }}>
            {allFields.length} fields on {OBJ_LABELS[obj]||obj} · {OBJ_KEYS.length} objects · Live schema Apr 2026
          </div>
        </div>
        <span style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:3, background:"rgba(239,231,69,0.15)", color:B.sunflower }}>v2.1</span>
      </div>

      {/* Object tabs */}
      <div style={{ padding:"8px 20px", borderBottom:"1px solid "+B.border, display:"flex", gap:4, flexWrap:"wrap" }}>
        {OBJ_KEYS.map(o => (
          <button key={o} onClick={() => switchObj(o)} style={{
            padding:"5px 12px", borderRadius:4, fontSize:11, fontWeight:obj===o?700:400,
            border:obj===o?"1px solid "+B.purple:"1px solid "+B.border,
            background:obj===o?"rgba(119,94,211,0.15)":"transparent",
            color:obj===o?B.lilac:B.textMuted, cursor:"pointer", ...ss
          }}>{OBJ_LABELS[o]||o}</button>
        ))}
      </div>

      {/* Presets bar */}
      <div style={{ padding:"8px 20px", borderBottom:"1px solid "+B.border, display:"flex", gap:4, flexWrap:"wrap", alignItems:"center" }}>
        <span style={{ fontSize:10, color:B.textMuted, textTransform:"uppercase", letterSpacing:"0.06em", marginRight:2 }}>Presets</span>
        {PRESET_KEYS.map(k => (
          <button key={k} onClick={() => applyPreset(k)} style={{
            padding:"4px 10px", borderRadius:3, fontSize:10, fontWeight:600,
            border:activePreset===k?"1px solid "+(PRESET_COLORS[k]):"1px solid "+B.border,
            background:activePreset===k?(PRESET_COLORS[k])+"18":"transparent",
            color:activePreset===k?PRESET_COLORS[k]:B.textMuted, cursor:"pointer", ...ss,
            textTransform:"uppercase", letterSpacing:"0.04em"
          }}>{k}</button>
        ))}
        {objCustom.length>0 && <>
          <div style={{ width:1, height:16, background:B.border, margin:"0 2px" }}/>
          {objCustom.map(k => (
            <button key={k} onClick={() => applyPreset(k)} style={{
              padding:"4px 10px", borderRadius:3, fontSize:10, fontWeight:600,
              border:activePreset===k?"1px solid "+B.lilac:"1px solid "+B.border,
              background:activePreset===k?"rgba(218,205,242,0.1)":"transparent",
              color:activePreset===k?B.lilac:B.textMuted, cursor:"pointer", ...ss
            }}>{String.fromCharCode(9733)} {k}</button>
          ))}
        </>}
        <div style={{ marginLeft:"auto", display:"flex", gap:4 }}>
          <Btn small onClick={() => { setSelected(new Set(allFields)); setActivePreset(null); }}>All</Btn>
          <Btn small onClick={() => { setSelected(new Set(["Id"])); setActivePreset(null); }}>None</Btn>
          <Btn small primary onClick={() => setShowSave(!showSave)}>Save Preset</Btn>
          {Object.keys(customPresets).length>0 && <Btn small onClick={() => setShowManage(!showManage)}>Manage</Btn>}
        </div>
      </div>

      {/* Save preset panel */}
      {showSave && (
        <div style={{ padding:"10px 20px", borderBottom:"1px solid "+B.border, background:"rgba(119,94,211,0.03)", display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontSize:11, color:B.textMuted }}>Save {selected.size} fields as:</span>
          <input value={presetName} onChange={e => setPresetName(e.target.value)} placeholder="Preset name..."
            onKeyDown={e => e.key==="Enter" && savePreset()}
            style={{ padding:"5px 10px", borderRadius:4, border:"1px solid "+B.border, background:B.navyMid, color:B.coolWhite, fontSize:11, width:180, ...ss }}/>
          <Btn small primary onClick={savePreset} disabled={!presetName.trim()}>Save (shared)</Btn>
          <Btn small onClick={() => setShowSave(false)}>Cancel</Btn>
        </div>
      )}

      {/* Manage presets */}
      {showManage && (
        <div style={{ padding:"10px 20px", borderBottom:"1px solid "+B.border, background:"rgba(119,94,211,0.03)" }}>
          <div style={{ fontSize:11, fontWeight:600, color:B.coolWhite, marginBottom:6 }}>Custom Presets</div>
          {Object.entries(customPresets).map(([key, fields]) => {
            const [o, name] = key.split("::");
            return (
              <div key={key} style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4 }}>
                <span style={{ fontSize:10, color:B.textMuted, ...mono, minWidth:100 }}>{OBJ_LABELS[o]||o}</span>
                <span style={{ fontSize:11, color:B.lilac, fontWeight:600 }}>{String.fromCharCode(9733)} {name}</span>
                <span style={{ fontSize:10, color:B.textMuted }}>({fields.length} fields)</span>
                <button onClick={() => deletePreset(key)} style={{ background:"none", border:"none", color:B.textMuted, cursor:"pointer", fontSize:10 }}>delete</button>
              </div>
            );
          })}
          <Btn small onClick={() => setShowManage(false)} style={{ marginTop:6 }}>Close</Btn>
        </div>
      )}

      <div style={{ display:"flex", minHeight:"calc(100vh - 150px)" }}>
        {/* LEFT */}

          {/* Search + collapse controls */}
          <div style={{ padding:"8px 20px", borderBottom:"1px solid "+B.border, display:"flex", gap:8, alignItems:"center" }}>

            <Btn small onClick={collapseAll}>Collapse All</Btn>
          </div>

          {/* Field categories */}
          <div style={{ flex:1, overflowY:"auto", padding:"8px 0" }}>
            {Object.entries(CAT_LABELS).map(([cat, label]) => {
              const fields = (fd[cat]||[]).filter(filterField);
              if (!fields.length) return null;
              const isC = collapsed[cat];
              const catSel = fields.filter(f => selected.has(f)).length;
              return (
                <div key={cat} style={{ marginBottom:4 }}>
                  <div onClick={() => setCollapsed({...collapsed, [cat]:!isC})}
                    style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 20px", cursor:"pointer", userSelect:"none" }}>
                    <span style={{ fontSize:12, color:B.textMuted, transform:isC?"rotate(-90deg)":"rotate(0)", transition:"transform 0.15s", display:"inline-block" }}>{String.fromCharCode(9662)}</span>
                    <span style={{ fontSize:10, fontWeight:700, color:CAT_COLORS[cat], textTransform:"uppercase", letterSpacing:"0.06em" }}>{label}</span>
                    <span style={{ fontSize:10, color:B.textMuted, ...mono }}>{catSel}/{fields.length}</span>
                    <button onClick={e => { e.stopPropagation(); selectCat(cat); }}
                      style={{ marginLeft:"auto", fontSize:9, color:B.textMuted, background:"none", border:"1px solid "+B.border, borderRadius:3, padding:"2px 6px", cursor:"pointer", ...ss }}>
                      {catSel===fields.length?"deselect":"select all"}
                    </button>
                  </div>
                  {!isC && (
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:1, padding:"0 20px" }}>
                      {fields.map(f => {
                        const sel = selected.has(f);
                        return (
                          <label key={f} style={{
                            display:"flex", alignItems:"center", gap:5, padding:"3px 6px", borderRadius:2,
                            cursor:"pointer", fontSize:10, color:sel?B.coolWhite:B.textMuted,
                            background:sel?"rgba(119,94,211,0.06)":"transparent", ...mono,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                          }}>
                            <input type="checkbox" checked={sel} onChange={() => toggle(f)} style={{ accentColor:B.purple, flexShrink:0 }}/>
                            <span title={f} style={{ overflow:"hidden", textOverflow:"ellipsis" }}>{f}</span>
                          </label>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* WHERE + ORDER + LIMIT */}
          <div style={{ padding:"10px 20px", borderTop:"1px solid "+B.border }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <span style={{ fontSize:10, color:B.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>WHERE</span>
              <Btn small onClick={addWhere}>+ Condition</Btn>
            </div>
            {wheres.map((w,i) => (
              <div key={i} style={{ display:"flex", gap:3, alignItems:"center", marginBottom:3 }}>
                {i>0 ? <select value={w.logic} onChange={e=>updWhere(i,"logic",e.target.value)} style={{ width:50, padding:"3px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.lilac, fontSize:9, ...mono }}>
                  <option value="AND">AND</option><option value="OR">OR</option>
                </select> : <div style={{width:50}}/>}
                <select value={w.field} onChange={e=>updWhere(i,"field",e.target.value)} style={{ flex:2, padding:"4px 5px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.coolWhite, fontSize:10, ...mono }}>
                  <option value="">field...</option>{allFields.map(f => <option key={f} value={f}>{f}</option>)}
                </select>
                <select value={w.op} onChange={e=>updWhere(i,"op",e.target.value)} style={{ width:70, padding:"4px 3px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.lilac, fontSize:10, ...mono }}>
                  {WHERE_OPS.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
                {!["= null","!= null","= TRUE","= FALSE"].includes(w.op) &&
                  <input value={w.value} onChange={e=>updWhere(i,"value",e.target.value)} placeholder="value"
                    style={{ flex:2, padding:"4px 5px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.coolWhite, fontSize:10, ...mono }}/>}
                <button onClick={() => rmWhere(i)} style={{ background:"none", border:"none", color:B.textMuted, cursor:"pointer", fontSize:11 }}>{String.fromCharCode(10005)}</button>
              </div>
            ))}
            <div style={{ display:"flex", gap:8, marginTop:8 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:9, color:B.textMuted, textTransform:"uppercase", marginBottom:2 }}>Order By</div>
                <div style={{ display:"flex", gap:3 }}>
                  <select value={orderBy} onChange={e=>setOrderBy(e.target.value)} style={{ flex:1, padding:"4px 5px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.coolWhite, fontSize:10, ...mono }}>
                    <option value="">None</option>{[...selected].sort().map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                  <select value={orderDir} onChange={e=>setOrderDir(e.target.value)} style={{ width:50, padding:"4px 3px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.lilac, fontSize:10, ...mono }}>
                    <option value="ASC">ASC</option><option value="DESC">DESC</option>
                  </select>
                </div>
              </div>
              <div style={{ width:70 }}>
                <div style={{ fontSize:9, color:B.textMuted, textTransform:"uppercase", marginBottom:2 }}>Limit</div>
                <input value={limit} onChange={e=>setLimit(e.target.value.replace(/\D/g,""))} placeholder="200"
                  style={{ width:"100%", padding:"4px 5px", borderRadius:3, border:"1px solid "+B.border, background:B.navyMid, color:B.coolWhite, fontSize:10, ...mono }}/>
              </div>
            </div>
          </div>
        </div>

        {/* RIGHT: output */}
        <div style={{ flex:"1 1 50%", padding:16, display:"flex", flexDirection:"column", background:B.navyLight }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <span style={{ fontSize:10, color:B.textMuted, textTransform:"uppercase", letterSpacing:"0.06em" }}>Generated SOQL</span>
            <span style={{ fontSize:10, color:B.textMuted, ...mono }}>{selected.size} fields</span>
          </div>
          <pre style={{
            flex:1, padding:14, background:B.navyMid, borderRadius:6, border:"1px solid "+B.border,
            fontSize:11, color:B.coolWhite, lineHeight:1.7, ...mono,
            whiteSpace:"pre-wrap", wordBreak:"break-all", overflowY:"auto", margin:0,
          }}>{soql}</pre>
          <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
            <Btn primary onClick={() => { navigator.clipboard.writeText(soql); toast("SOQL copied!"); }}>Copy SOQL</Btn>
            <Btn onClick={() => { navigator.clipboard.writeText("Object: "+obj+"\nPreset: "+(activePreset||"Custom")+"\nFields: "+selected.size+"\n\n"+soql); toast("Copied with context!"); }}>Copy + Context</Btn>
          </div>

          {/* Quick queries */}
          <div style={{ marginTop:14, borderTop:"1px solid "+B.border, paddingTop:10 }}>
            <div style={{ fontSize:10, color:B.textMuted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Quick Queries</div>
            <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
              {obj==="Account" && <>
                <Btn small onClick={()=>setWheres([{field:"CreatedDate",op:"=",value:"LAST_MONTH",logic:""}])}>Created Last Month</Btn>
                <Btn small onClick={()=>setWheres([{field:"LastActivityDate",op:"= null",value:"",logic:""}])}>No Activity</Btn>
              </>}
              {obj==="Contact" && <>
                <Btn small onClick={()=>setWheres([{field:"Email",op:"= null",value:"",logic:""}])}>Missing Email</Btn>
                <Btn small onClick={()=>setWheres([{field:"AccountId",op:"= null",value:"",logic:""}])}>Orphaned</Btn>
              </>}
              {obj==="Opportunity" && <>
                <Btn small onClick={()=>setWheres([{field:"IsClosed",op:"= FALSE",value:"",logic:""},{field:"CloseDate",op:"<",value:"TODAY",logic:"AND"}])}>Open Past Due</Btn>
                <Btn small onClick={()=>setWheres([{field:"StageName",op:"=",value:"Closed Won",logic:""},{field:"CloseDate",op:">=",value:"THIS_QUARTER",logic:"AND"}])}>Won This Qtr</Btn>
                <Btn small onClick={()=>setWheres([{field:"SBQQ__PrimaryQuote__c",op:"= null",value:"",logic:""},{field:"IsClosed",op:"= FALSE",value:"",logic:"AND"}])}>No Quote</Btn>
              </>}
              {obj==="Contract" && <>
                <Btn small onClick={()=>setWheres([{field:"Status",op:"=",value:"Activated",logic:""}])}>Active</Btn>
                <Btn small onClick={()=>setWheres([{field:"EndDate",op:"<=",value:"NEXT_N_DAYS:90",logic:""},{field:"Status",op:"=",value:"Activated",logic:"AND"}])}>Expiring 90d</Btn>
              </>}
              {obj==="AdminRequest__c" && <>
                <Btn small onClick={()=>setWheres([{field:"Request_Status__c",op:"=",value:"Closed",logic:""},{field:"Completed_Date__c",op:"=",value:"LAST_WEEK",logic:"AND"}])}>Closed Last Week</Btn>
                <Btn small onClick={()=>setWheres([{field:"Request_Status__c",op:"!=",value:"Closed",logic:""}])}>Open Requests</Btn>
                <Btn small onClick={()=>setWheres([{field:"Severity__c",op:"=",value:"High",logic:""}])}>High Severity</Btn>
              </>}
              {obj==="SBQQ__Quote__c" && <>
                <Btn small onClick={()=>setWheres([{field:"SBQQ__Status__c",op:"=",value:"Draft",logic:""}])}>Draft</Btn>
                <Btn small onClick={()=>setWheres([{field:"SBQQ__Primary__c",op:"= TRUE",value:"",logic:""}])}>Primary</Btn>
              </>}
              <Btn small onClick={()=>setWheres([])}>Clear</Btn>
            </div>
            {wheres.length>0 && <div style={{ marginTop:4, fontSize:9, color:B.textMuted }}>Date literals: TODAY {String.fromCharCode(183)} LAST_WEEK {String.fromCharCode(183)} THIS_MONTH {String.fromCharCode(183)} LAST_N_DAYS:30</div>}
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<SOQLBuilder/>);
</script>
</body>
</html>
